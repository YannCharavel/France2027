function fbWrite(id,d){dbRef&&dbRef.child(String(id)).set(d).catch(()=>{})}

function SetupScreen({onConnect}){
  const[url,setUrl]=useState("");const[err,setErr]=useState("");const[busy,setBusy]=useState(false);
  const go=()=>{let u=url.trim();if(!u){setErr("Please paste your Firebase database URL");return}if(!u.startsWith("https://"))u="https://"+u;if(!u.includes("firebase")){setErr("URL should contain firebaseio.com or firebasedatabase.app");return}setBusy(true);setErr("");if(initFB(u)){localStorage.setItem("relo-fb-url",u);onConnect(u)}else{setErr("Could not connect")}setBusy(false)};
  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#FAF9F6",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,padding:28,maxWidth:380,width:"100%",boxShadow:"0 2px 20px rgba(0,0,0,0.08)"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:48,marginBottom:8}}>🗼</div>
          <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:22,margin:0,fontStyle:"italic",color:"#1B2A4A"}}>Sunshine Coast → France</h1>
          <p style={{fontSize:12,color:"#888",margin:"4px 0 0"}}>Family Relocation Planner</p>
        </div>
        <div style={{background:"#F0F4FF",borderRadius:10,padding:14,marginBottom:16}}>
          <p style={{margin:0,fontSize:12,color:"#1B2A4A",lineHeight:1.5}}><strong>One-time setup:</strong> Paste your Firebase database URL below so both you and your wife see the same checklist in real time.</p>
        </div>
        <label style={{fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:1}}>Firebase Database URL</label>
        <input value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="https://your-project-default-rtdb.firebaseio.com" style={{width:"100%",padding:"10px 12px",border:"1px solid #ddd",borderRadius:8,fontSize:13,marginTop:6,marginBottom:12,boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif"}} />
        {err&&<p style={{color:"#C62828",fontSize:12,margin:"0 0 10px"}}>{err}</p>}
        <button onClick={go} disabled={busy} style={{width:"100%",padding:12,background:"#1B2A4A",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer"}}>{busy?"Connecting...":"Connect & Start"}</button>
        <button onClick={()=>onConnect(null)} style={{width:"100%",padding:10,background:"none",border:"1px solid #ddd",borderRadius:8,fontSize:12,cursor:"pointer",marginTop:8,color:"#888"}}>Use offline (no sync)</button>
      </div>
    </div>
  );
}

function App(){
  const[fbUrl,setFbUrl]=useState("https://france2027-a7261-default-rtdb.asia-southeast1.firebasedatabase.app/");
  const[tasks,setTasks]=useState([]);const[loaded,setLoaded]=useState(false);
  const[activePhase,setActivePhase]=useState("now");const[filterCat,setFilterCat]=useState("all");
  const[filterOwner,setFilterOwner]=useState("all");const[search,setSearch]=useState("");
  const[view,setView]=useState("phases");const[expanded,setExpanded]=useState(null);
  const[showAdd,setShowAdd]=useState(false);const[editNames,setEditNames]=useState(false);
  const[ownerNames,setOwnerNames]=useState({parent1:"Parent 1",parent2:"Parent 2"});
  const[showSettings,setShowSettings]=useState(false);

  useEffect(()=>{
    if(fbUrl===undefined)return;
    if(fbUrl===null){
      // offline
      try{const sn=localStorage.getItem("relo-names");if(sn)setOwnerNames(JSON.parse(sn));
        const sv=localStorage.getItem("relo-data");if(sv){const p=JSON.parse(sv);const m={};p.forEach(t=>{m[t.id]=t});
          const merged=INITIAL_TASKS.map(t=>{const s=m[t.id];return s?{...t,done:s.done,notes:s.notes||"",subtasks:s.subtasks||[],owner:s.owner||t.owner}:{...t,done:false,notes:"",subtasks:[]}});
          const custom=p.filter(t=>typeof t.id==="string");setTasks([...merged,...custom])}
        else{setTasks(INITIAL_TASKS.map(t=>({...t,done:false,notes:"",subtasks:[]})))}}
      catch(e){setTasks(INITIAL_TASKS.map(t=>({...t,done:false,notes:"",subtasks:[]})))}
      setLoaded(true);return;
    }
    // Firebase
    initFB(fbUrl);
    namesRef.on("value",s=>{const v=s.val();if(v)setOwnerNames(v)},()=>{});
    let ts={},ct=[],gt=false,gc=false;
    const merge=()=>{if(!gt)return;
      const merged=INITIAL_TASKS.map(t=>{const s=ts[t.id];return s?{...t,done:!!s.done,notes:s.notes||"",subtasks:s.subtasks||[],owner:s.owner||t.owner}:{...t,done:false,notes:"",subtasks:[]}});
      setTasks([...merged,...ct]);setLoaded(true)};
    const fallback=err=>{ts={};gt=true;merge();if(err)console.warn("Firebase:",err.message)};
    dbRef.on("value",s=>{ts=s.val()||{};gt=true;merge()},fallback);
    customRef.on("value",s=>{ct=Object.values(s.val()||{});gc=true},e=>{gc=true});
    const timer=setTimeout(()=>{if(!gt){fallback(new Error("timeout"))}},6000);
    return()=>{clearTimeout(timer);dbRef&&dbRef.off();namesRef&&namesRef.off();customRef&&customRef.off()};
  },[fbUrl]);

  const save=(updated)=>{if(!fbUrl){localStorage.setItem("relo-data",JSON.stringify(updated.map(t=>({id:t.id,done:t.done,notes:t.notes,subtasks:t.subtasks,owner:t.owner,...(typeof t.id==="string"?{phase:t.phase,cat:t.cat,text:t.text,priority:t.priority}:{})}))));} };
  const syncTask=(task)=>{if(fbUrl)fbWrite(task.id,{done:task.done,notes:task.notes||"",subtasks:task.subtasks||[],owner:task.owner})};

  const toggle=useCallback(id=>{setTasks(p=>{const u=p.map(t=>t.id===id?{...t,done:!t.done}:t);const task=u.find(t=>t.id===id);if(task)syncTask(task);save(u);return u})},[fbUrl]);
  const setOwnerFn=useCallback((id,ow)=>{setTasks(p=>{const u=p.map(t=>t.id===id?{...t,owner:ow}:t);const task=u.find(t=>t.id===id);if(task){syncTask(task);if(typeof id==="string"&&fbUrl)fbWriteCustom(id,task)}save(u);return u})},[fbUrl]);
  const setNote=useCallback((id,n)=>{setTasks(p=>{const u=p.map(t=>t.id===id?{...t,notes:n}:t);const task=u.find(t=>t.id===id);if(task)syncTask(task);save(u);return u})},[fbUrl]);
  const addSub=useCallback((id,text)=>{if(!text.trim())return;setTasks(p=>{const u=p.map(t=>t.id===id?{...t,subtasks:[...(t.subtasks||[]),{id:uid(),text,done:false}]}:t);const task=u.find(t=>t.id===id);if(task)syncTask(task);save(u);return u})},[fbUrl]);
  const togSub=useCallback((tid,sid)=>{setTasks(p=>{const u=p.map(t=>t.id===tid?{...t,subtasks:t.subtasks.map(s=>s.id===sid?{...s,done:!s.done}:s)}:t);const task=u.find(t=>t.id===tid);if(task)syncTask(task);save(u);return u})},[fbUrl]);
  const delSub=useCallback((tid,sid)=>{setTasks(p=>{const u=p.map(t=>t.id===tid?{...t,subtasks:t.subtasks.filter(s=>s.id!==sid)}:t);const task=u.find(t=>t.id===tid);if(task)syncTask(task);save(u);return u})},[fbUrl]);
  const delTask=useCallback(id=>{setTasks(p=>p.filter(t=>t.id!==id));if(fbUrl)fbDelCustom(id)},[fbUrl]);
  const addTask=useCallback(task=>{const id=uid();const nt={...task,id,done:false,notes:"",subtasks:[]};setTasks(p=>[...p,nt]);setShowAdd(false);if(fbUrl){fbWriteCustom(id,nt);fbWrite(id,{done:false,notes:"",subtasks:[],owner:task.owner})}}, [fbUrl]);
  const updateNames=useCallback(n=>{setOwnerNames(n);if(fbUrl)fbWriteNames(n);else localStorage.setItem("relo-names",JSON.stringify(n))},[fbUrl]);

  const ownerLabel=(id)=>id==="parent1"?ownerNames.parent1:id==="parent2"?ownerNames.parent2:OWNER_MAP[id]?.label||id;
  const stats=useMemo(()=>{const bp={};PHASES.forEach(p=>{const pt=tasks.filter(t=>t.phase===p.id);bp[p.id]={total:pt.length,done:pt.filter(t=>t.done).length}});return{bp,total:tasks.length,done:tasks.filter(t=>t.done).length}},[tasks]);
  const filtered=useMemo(()=>{let r=tasks.filter(t=>t.phase===activePhase);if(filterCat!=="all")r=r.filter(t=>t.cat===filterCat);if(filterOwner!=="all")r=r.filter(t=>t.owner===filterOwner);if(search)r=r.filter(t=>t.text.toLowerCase().includes(search.toLowerCase()));return r},[tasks,activePhase,filterCat,filterOwner,search]);
  const grouped=useMemo(()=>{const g={};filtered.forEach(t=>{(g[t.cat]=g[t.cat]||[]).push(t)});return g},[filtered]);

  if(fbUrl===undefined)return<SetupScreen onConnect={u=>setFbUrl(u)}/>;
  const phase=PHASES.find(p=>p.id===activePhase);const ps=stats.bp[activePhase];
  if(!loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'DM Sans',sans-serif"}}><p>Loading...</p></div>;

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#FAF9F6",minHeight:"100vh",color:"#1a1a1a"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(140deg,#1B2A4A 0%,#2D4373 60%,#3E5A99 100%)",padding:"24px 20px 18px",color:"#fff",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-10,fontSize:100,opacity:0.05,pointerEvents:"none"}}>🗼</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:24,fontWeight:400,margin:0,fontStyle:"italic"}}>Sunshine Coast → France</h1>
          <p style={{margin:"3px 0 0",opacity:0.6,fontSize:12}}>Family Relocation · July 2027 – July 2028</p></div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setEditNames(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:11,cursor:"pointer"}}>✏️ Names</button>
            <button onClick={()=>setShowSettings(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:11,cursor:"pointer"}}>⚙️</button>
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",marginTop:14,display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4,opacity:0.7}}><span>Overall {fbUrl?"· 🟢 Synced":"· Offline"}</span><span>{stats.done}/{stats.total}</span></div>
            <div style={{height:5,background:"rgba(255,255,255,0.12)",borderRadius:3}}><div style={{height:5,background:"linear-gradient(90deg,#64FFDA,#80CBC4)",borderRadius:3,width:`${stats.total?stats.done/stats.total*100:0}%`,transition:"width .5s"}}/></div>
          </div>
          <div style={{fontSize:20,fontWeight:700,fontFamily:"'Instrument Serif',serif"}}>{stats.total?Math.round(stats.done/stats.total*100):0}%</div>
        </div>
      </div>

      {/* Settings */}
      {showSettings&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowSettings(false)}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:24,width:"100%",maxWidth:340}}>
          <h3 style={{margin:"0 0 16px",fontFamily:"'Instrument Serif',serif",fontSize:20}}>Settings</h3>
          <p style={{fontSize:12,color:"#888",margin:"0 0 8px"}}>Sync: {fbUrl?"🟢 Connected":"Offline"}</p>
          {fbUrl&&<p style={{fontSize:10,color:"#aaa",wordBreak:"break-all",margin:"0 0 16px"}}>{fbUrl}</p>}
          <button onClick={()=>{localStorage.removeItem("relo-fb-url");window.location.reload()}} style={{width:"100%",padding:10,background:"#FFEBEE",color:"#C62828",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600}}>{fbUrl?"Disconnect & Reconfigure":"Set Up Sync"}</button>
          <button onClick={()=>setShowSettings(false)} style={{width:"100%",padding:10,background:"none",border:"1px solid #ddd",borderRadius:8,fontSize:12,cursor:"pointer",marginTop:8,color:"#888"}}>Close</button>
        </div>
      </div>}

      {/* Names */}
      {editNames&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setEditNames(false)}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:24,width:"100%",maxWidth:340}}>
          <h3 style={{margin:"0 0 16px",fontFamily:"'Instrument Serif',serif",fontSize:20}}>Set Your Names</h3>
          {["parent1","parent2"].map(k=><div key={k} style={{marginBottom:12}}>
            <label style={{fontSize:10,color:"#999",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>{k==="parent1"?"Parent 1":"Parent 2"}</label>
            <input value={ownerNames[k]} onChange={e=>updateNames({...ownerNames,[k]:e.target.value})} style={{width:"100%",padding:"8px 12px",border:"1px solid #ddd",borderRadius:8,fontSize:14,marginTop:4,boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif"}}/>
          </div>)}
          <button onClick={()=>setEditNames(false)} style={{width:"100%",padding:12,background:"#1B2A4A",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",marginTop:4}}>Done</button>
        </div>
      </div>}

      {/* Tabs */}
      <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #eae7df"}}>
        {["phases","overview"].map(v=><button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"11px 0",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:view===v?700:400,color:view===v?"#1B2A4A":"#999",borderBottom:view===v?"2px solid #1B2A4A":"2px solid transparent",fontFamily:"'DM Sans',sans-serif",textTransform:"capitalize"}}>{v}</button>)}
      </div>

      {view==="overview"?(
        <div className="overview-inner">
          <h3 style={{fontFamily:"'Instrument Serif',serif",fontSize:18,margin:"0 0 10px",color:"#1B2A4A"}}>Timeline</h3>
          {PHASES.map(p=>{const s=stats.bp[p.id];const pct=s.total?Math.round(s.done/s.total*100):0;return(
            <button key={p.id} onClick={()=>{setActivePhase(p.id);setView("phases")}} style={{width:"100%",background:"#fff",border:"1px solid #eae7df",borderLeft:`4px solid ${p.color}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left",fontFamily:"'DM Sans',sans-serif"}}>
              <span style={{fontSize:22}}>{p.icon}</span>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{p.label}</div><div style={{fontSize:10,color:"#999"}}>{p.subtitle}</div>
                <div style={{height:4,background:"#f0ede6",borderRadius:2,marginTop:6}}><div style={{height:4,background:p.color,borderRadius:2,width:`${pct}%`}}/></div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:700,color:p.color,fontFamily:"'Instrument Serif',serif"}}>{pct}%</div><div style={{fontSize:10,color:"#aaa"}}>{s.done}/{s.total}</div></div>
            </button>)})}
          <h3 style={{fontFamily:"'Instrument Serif',serif",fontSize:18,margin:"20px 0 10px",color:"#1B2A4A"}}>By Category</h3>
          <div className="ov-grid-cat">
            {CATEGORIES.map(c=>{const ct=tasks.filter(t=>t.cat===c.id);const cd=ct.filter(t=>t.done).length;const pct=ct.length?Math.round(cd/ct.length*100):0;return(
              <div key={c.id} style={{background:"#fff",border:"1px solid #eae7df",borderRadius:8,padding:"10px 12px"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6}}><span style={{fontSize:14}}>{c.icon}</span><span style={{fontSize:11,fontWeight:600}}>{c.label}</span></div>
                <div style={{height:3,background:"#f0ede6",borderRadius:2}}><div style={{height:3,background:c.color,borderRadius:2,width:`${pct}%`}}/></div>
                <div style={{fontSize:10,color:"#aaa",marginTop:4}}>{cd}/{ct.length}</div></div>)})}
          </div>
          <h3 style={{fontFamily:"'Instrument Serif',serif",fontSize:18,margin:"20px 0 10px",color:"#1B2A4A"}}>By Owner</h3>
          <div className="ov-grid-owner">
            {OWNERS.map(o=>{const ot=tasks.filter(t=>t.owner===o.id);const od=ot.filter(t=>t.done).length;return(
              <div key={o.id} style={{background:o.bg,border:`1px solid ${o.color}22`,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:12,fontWeight:600,color:o.color}}>{ownerLabel(o.id)}</div>
                <div style={{fontSize:20,fontWeight:700,fontFamily:"'Instrument Serif',serif",color:o.color}}>{od}<span style={{fontSize:12,fontWeight:400}}>/{ot.length}</span></div></div>)})}
          </div>
        </div>
      ):(
        <div className="app-body">
          {/* Sidebar – desktop only */}
          <div className="sidebar">
            {PHASES.map(p=>{const s=stats.bp[p.id];const pct=s.total?Math.round(s.done/s.total*100):0;const a=p.id===activePhase;return(
              <button key={p.id} onClick={()=>setActivePhase(p.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:10,border:"none",background:a?`${p.color}12`:"none",cursor:"pointer",textAlign:"left",fontFamily:"'DM Sans',sans-serif",marginBottom:2}}>
                <span style={{fontSize:18,flexShrink:0}}>{p.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:a?700:400,color:a?p.color:"#444",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.label}</div>
                  <div style={{height:3,background:"#f0ede6",borderRadius:2,marginTop:3}}><div style={{height:3,background:pct===100?"#43A047":p.color,borderRadius:2,width:`${pct}%`,transition:"width .5s"}}/></div>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:a?p.color:"#aaa",flexShrink:0}}>{pct}%</span>
              </button>)})}
          </div>

          {/* Main column */}
          <div className="main-col">
            {/* Phase pills – mobile only */}
            <div className="phase-pills">
              {PHASES.map(p=>{const s=stats.bp[p.id];const pct=s.total?Math.round(s.done/s.total*100):0;const a=p.id===activePhase;return(
                <button key={p.id} onClick={()=>setActivePhase(p.id)} style={{flexShrink:0,padding:"6px 12px",borderRadius:18,border:a?`2px solid ${p.color}`:"1px solid #e8e5dc",background:a?`${p.color}10`:"#fafaf7",cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:a?700:400,color:a?p.color:"#777"}}>
                  <span>{p.icon}</span><span>{p.label}</span>
                  <span style={{background:pct===100?"#43A047":p.color,color:"#fff",borderRadius:8,padding:"0 5px",fontSize:9,fontWeight:700}}>{pct}%</span>
                </button>)})}
            </div>

            {/* Phase header */}
            <div style={{padding:"14px 16px 10px",borderBottom:"1px solid #eae7df"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <span style={{fontSize:26}}>{phase.icon}</span>
                <div><h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:20,margin:0,color:phase.color,fontStyle:"italic"}}>{phase.label}</h2>
                <p style={{fontSize:11,color:"#999",margin:0}}>{phase.subtitle} · {ps.done}/{ps.total} done</p></div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:"1 1 100px",padding:"7px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:12,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{padding:"7px 6px",border:"1px solid #ddd",borderRadius:8,fontSize:11,fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}><option value="all">All Categories</option>{CATEGORIES.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select>
                <select value={filterOwner} onChange={e=>setFilterOwner(e.target.value)} style={{padding:"7px 6px",border:"1px solid #ddd",borderRadius:8,fontSize:11,fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}><option value="all">All Owners</option>{OWNERS.map(o=><option key={o.id} value={o.id}>{ownerLabel(o.id)}</option>)}</select>
              </div>
            </div>

            {/* Tasks */}
            <div style={{padding:"6px 14px 80px"}}>
              {Object.keys(grouped).length===0&&<div style={{textAlign:"center",padding:40,color:"#bbb"}}><p style={{fontSize:28}}>✨</p><p>No matching tasks</p></div>}
              {CATEGORIES.filter(c=>grouped[c.id]).map(cat=>(
                <div key={cat.id} style={{marginTop:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                    <span style={{fontSize:15}}>{cat.icon}</span>
                    <h3 style={{fontSize:13,fontWeight:700,color:cat.color,margin:0}}>{cat.label}</h3>
                    <span style={{fontSize:9,color:"#aaa",background:"#f5f3ee",padding:"1px 7px",borderRadius:8}}>{grouped[cat.id].filter(t=>t.done).length}/{grouped[cat.id].length}</span>
                  </div>
                  {grouped[cat.id].map(task=>{
                    const isExp=expanded===task.id;const ow=OWNER_MAP[task.owner];
                    const subDone=(task.subtasks||[]).filter(s=>s.done).length;const subTotal=(task.subtasks||[]).length;
                    return(
                      <div key={task.id} style={{background:task.done?"#f9f9f6":"#fff",border:"1px solid #eae7df",borderRadius:10,marginBottom:6,borderLeft:`3px solid ${PRIORITY_CONFIG[task.priority].color}`,opacity:task.done?0.5:1,transition:"all .2s"}}>
                        <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"10px 10px 8px",cursor:"pointer"}} onClick={()=>toggle(task.id)}>
                          <div style={{width:20,height:20,borderRadius:5,flexShrink:0,marginTop:1,border:task.done?"none":"2px solid #ccc",background:task.done?"#43A047":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {task.done&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <p style={{margin:0,fontSize:13,lineHeight:1.4,textDecoration:task.done?"line-through":"none",color:task.done?"#999":"#333"}}>{task.text}</p>
                            <div style={{display:"flex",gap:5,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
                              <span style={{fontSize:9,fontWeight:600,padding:"1px 6px",borderRadius:4,color:PRIORITY_CONFIG[task.priority].color,background:PRIORITY_CONFIG[task.priority].bg}}>{PRIORITY_CONFIG[task.priority].label}</span>
                              <span style={{fontSize:9,fontWeight:600,padding:"1px 6px",borderRadius:4,color:ow?.color,background:ow?.bg}}>{ownerLabel(task.owner)}</span>
                              {subTotal>0&&<span style={{fontSize:9,color:"#999"}}>☑ {subDone}/{subTotal}</span>}
                              {task.notes&&<span style={{fontSize:9,color:"#999"}}>📝</span>}
                            </div>
                          </div>
                          <button onClick={e=>{e.stopPropagation();setExpanded(isExp?null:task.id)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#bbb",padding:"0 2px",flexShrink:0}}>{isExp?"▲":"▼"}</button>
                        </div>
                        {isExp&&(
                          <div style={{padding:"0 12px 12px",borderTop:"1px solid #f0ede6"}} onClick={e=>e.stopPropagation()}>
                            <div style={{marginTop:10,marginBottom:10}}>
                              <label style={{fontSize:10,fontWeight:600,color:"#999",textTransform:"uppercase",letterSpacing:.8}}>Owner</label>
                              <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
                                {OWNERS.map(o=><button key={o.id} onClick={()=>setOwnerFn(task.id,o.id)} style={{padding:"4px 10px",borderRadius:14,fontSize:11,fontWeight:task.owner===o.id?700:400,border:task.owner===o.id?`2px solid ${o.color}`:"1px solid #ddd",background:task.owner===o.id?o.bg:"#fafaf7",color:task.owner===o.id?o.color:"#888",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{ownerLabel(o.id)}</button>)}
                              </div>
                            </div>
                            <div style={{marginBottom:10}}>
                              <label style={{fontSize:10,fontWeight:600,color:"#999",textTransform:"uppercase",letterSpacing:.8}}>Notes</label>
                              <textarea value={task.notes||""} onChange={e=>setNote(task.id,e.target.value)} placeholder="Add a note..." rows={2} style={{width:"100%",padding:"8px 10px",border:"1px solid #e0ddd5",borderRadius:8,fontSize:12,fontFamily:"'DM Sans',sans-serif",resize:"vertical",marginTop:4,boxSizing:"border-box",outline:"none",background:"#FDFCF9"}}/>
                            </div>
                            <div>
                              <label style={{fontSize:10,fontWeight:600,color:"#999",textTransform:"uppercase",letterSpacing:.8}}>Subtasks</label>
                              {(task.subtasks||[]).map(sub=>(
                                <div key={sub.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 0",borderBottom:"1px solid #f5f3ee"}}>
                                  <div onClick={()=>togSub(task.id,sub.id)} style={{width:16,height:16,borderRadius:4,border:sub.done?"none":"1.5px solid #ccc",background:sub.done?"#43A047":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                                    {sub.done&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
                                  </div>
                                  <span style={{flex:1,fontSize:12,color:sub.done?"#bbb":"#555",textDecoration:sub.done?"line-through":"none"}}>{sub.text}</span>
                                  <button onClick={()=>delSub(task.id,sub.id)} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:14,padding:0}}>×</button>
                                </div>))}
                              <SubInput onAdd={text=>addSub(task.id,text)}/>
                            </div>
                            {typeof task.id==="string"&&<button onClick={()=>{delTask(task.id);setExpanded(null)}} style={{marginTop:10,padding:"6px 12px",background:"#FFEBEE",color:"#C62828",border:"none",borderRadius:6,fontSize:11,cursor:"pointer",fontWeight:600}}>Delete Task</button>}
                          </div>)}
                      </div>)})}
                </div>))}
            </div>
            {!showAdd&&<button onClick={()=>setShowAdd(true)} style={{position:"fixed",bottom:24,right:24,width:50,height:50,borderRadius:"50%",background:phase.color,color:"#fff",border:"none",fontSize:24,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,.2)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}>+</button>}
            {showAdd&&<AddPanel phase={activePhase} phaseColor={phase.color} ownerLabel={ownerLabel} onAdd={addTask} onClose={()=>setShowAdd(false)}/>}
          </div>
        </div>)}
    </div>);
}

function SubInput({onAdd}){const[t,setT]=useState("");return(
  <div style={{display:"flex",gap:6,marginTop:6}}>
    <input value={t} onChange={e=>setT(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){onAdd(t);setT("")}}} placeholder="Add subtask..." style={{flex:1,padding:"6px 10px",border:"1px solid #e0ddd5",borderRadius:6,fontSize:12,fontFamily:"'DM Sans',sans-serif",outline:"none",background:"#FDFCF9"}}/>
    <button onClick={()=>{onAdd(t);setT("")}} style={{padding:"6px 12px",background:"#1B2A4A",color:"#fff",border:"none",borderRadius:6,fontSize:11,cursor:"pointer",fontWeight:600}}>Add</button>
  </div>)}

function AddPanel({phase,phaseColor,ownerLabel,onAdd,onClose}){
  const[text,setText]=useState("");const[cat,setCat]=useState("visa");const[priority,setPriority]=useState("medium");const[owner,setOwner]=useState("both");
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #ddd",padding:"16px 18px 28px",boxShadow:"0 -4px 20px rgba(0,0,0,.1)",zIndex:20,maxWidth:540,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><h4 style={{margin:0,fontSize:15,fontWeight:700}}>Add Task</h4><button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#999"}}>×</button></div>
      <input autoFocus value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&text.trim()&&onAdd({text,cat,phase,priority,owner})} placeholder="What needs to be done?" style={{width:"100%",padding:"10px 12px",border:"1px solid #ddd",borderRadius:8,fontSize:14,fontFamily:"'DM Sans',sans-serif",marginBottom:10,boxSizing:"border-box"}}/>
      <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
        <select value={cat} onChange={e=>setCat(e.target.value)} style={{flex:1,padding:7,border:"1px solid #ddd",borderRadius:8,fontSize:11,fontFamily:"'DM Sans',sans-serif"}}>{CATEGORIES.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select>
        <select value={priority} onChange={e=>setPriority(e.target.value)} style={{flex:1,padding:7,border:"1px solid #ddd",borderRadius:8,fontSize:11,fontFamily:"'DM Sans',sans-serif"}}>{Object.entries(PRIORITY_CONFIG).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
      </div>
      <div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>
        {OWNERS.map(o=><button key={o.id} onClick={()=>setOwner(o.id)} style={{padding:"5px 12px",borderRadius:14,fontSize:11,fontWeight:owner===o.id?700:400,border:owner===o.id?`2px solid ${o.color}`:"1px solid #ddd",background:owner===o.id?o.bg:"#fafaf7",color:owner===o.id?o.color:"#888",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{ownerLabel(o.id)}</button>)}
      </div>
      <button onClick={()=>text.trim()&&onAdd({text,cat,phase,priority,owner})} style={{width:"100%",padding:12,background:phaseColor,color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Add Task</button>
    </div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
